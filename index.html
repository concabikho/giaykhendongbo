<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile VN - Tạo Giấy Khen Đồng Bo</title>
    <meta name="description" content="Trang web tạo giấy khen PUBG Mobile độc đáo. Tự động điền tên và tải về ảnh chất lượng cao để chia sẻ với đồng đội.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&family=Teko:wght@500;600;700&family=Montserrat:wght@400;600;700;800&family=Alex+Brush&family=Oswald:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,600;1,800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome icons for buttons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Particles Overlay for Gaming Atmosphere -->
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="app-container">
        <!-- Decoration Grid for Cyberpunk/PUBG theme -->
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
        
        <header class="app-header">
            <div class="logo-area">
                <i class="fa-solid fa-medal logo-icon animate-pulse"></i>
                <div class="logo-text">
                    <span class="logo-sub">CỘNG ĐỒNG PUBG MOBILE VN</span>
                    <h1>GIẤY KHEN ĐỒNG BO</h1>
                </div>
            </div>
        </header>
        
        <main class="main-content">
            <!-- Left Panel: Editor & Controls -->
            <section class="editor-panel card animate-slide-in">
                <div class="card-header">
                    <i class="fa-solid fa-sliders-h header-icon"></i>
                    <h2>BẢNG ĐIỀU KHIỂN</h2>
                </div>
                
                <div class="control-group">
                    <label for="username">
                        <i class="fa-solid fa-user-ninja label-icon"></i> TÊN ĐỒNG BO
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Nhập tên của bạn..." 
                        maxlength="30"
                        autocomplete="off"
                        value="Chiến Binh Chạy Bo"
                    >
                    <div class="helper-text">Hỗ trợ tối đa 30 ký tự, tự động thu nhỏ nếu tên dài.</div>
                </div>
                
                <div class="control-row">
                    <div class="control-group half-width">
                        <label for="fontStyle">
                            <i class="fa-solid fa-font label-icon"></i> KIỂU CHỮ TÊN
                        </label>
                        <select id="fontStyle">
                            <option value="calligraphy" selected>Bay bổng (Calligraphy)</option>
                            <option value="serif">Cổ điển (Serif Ý)</option>
                            <option value="military">Quân đội (Bold Military)</option>
                        </select>
                    </div>
                    
                    <div class="control-group half-width">
                        <label>
                            <i class="fa-solid fa-palette label-icon"></i> MÀU CHỮ
                        </label>
                        <div class="color-options">
                            <label class="color-option gold active" title="Vàng PUBG">
                                <input type="radio" name="fontColor" value="gold" checked>
                                <span class="color-preview"></span>
                            </label>
                            <label class="color-option red" title="Đỏ Crimson">
                                <input type="radio" name="fontColor" value="red">
                                <span class="color-preview"></span>
                            </label>
                            <label class="color-option black" title="Đen Carbon">
                                <input type="radio" name="fontColor" value="black">
                                <span class="color-preview"></span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <button id="btnDownload" class="btn btn-primary btn-lg glow-effect">
                    <span class="btn-content">
                        <!-- Custom Inline SVG PUBG Air Drop Crate Icon -->
                        <svg class="btn-icon airdrop-icon animate-pulse" viewBox="0 0 24 24" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;">
                            <!-- Shadow -->
                            <rect x="5" y="18" width="14" height="2" fill="rgba(0,0,0,0.4)" rx="1" />
                            <!-- Red Box Crate Body -->
                            <rect x="5" y="11" width="14" height="7" fill="#d32f2f" rx="0.5" />
                            <rect x="7" y="12" width="1.5" height="5" fill="#a81e1e" />
                            <rect x="11.25" y="12" width="1.5" height="5" fill="#a81e1e" />
                            <rect x="15.5" y="12" width="1.5" height="5" fill="#a81e1e" />
                            <!-- Blue Tarp Cover with Wavy Folds -->
                            <path d="M4 6.5 C4 6 4.5 5.5 5 5.5 H19 C19.5 5.5 20 6 20 6.5 V10.2 C20 10.8 19.3 11.2 18.7 11.0 L17.8 10.7 C17.3 10.5 16.7 10.7 16.3 11.1 L15.7 11.7 C15.3 12.1 14.7 12.3 14.1 12.2 L13.4 12.1 C12.8 12.0 12.2 12.2 11.8 12.6 L11.2 13.2 C10.8 13.6 10.2 13.8 9.6 13.7 L8.9 13.6 C8.3 13.5 7.7 13.7 7.3 14.1 L6.7 14.7 C6.3 15.1 5.7 15.3 5.1 15.2 L4 15.0 V6.5Z" fill="#1565c0" />
                            <path d="M4 5.5 H20 V6.5 H4V5.5Z" fill="#0d47a1" />
                            <!-- Yellow Cargo Straps -->
                            <rect x="9" y="5.5" width="1.5" height="12.5" fill="#ffc107" />
                            <rect x="13.5" y="5.5" width="1.5" height="12.5" fill="#ffc107" />
                        </svg>
                        <span>NHẬN GIẤY KHEN</span>
                    </span>
                    <span class="glow-layer"></span>
                </button>
            </section>
            
            <!-- Right Panel: Live Preview -->
            <section class="preview-panel animate-slide-in delay-1">
                <div class="card-header">
                    <i class="fa-solid fa-eye header-icon"></i>
                    <h2>BẢN XEM TRƯỚC HÌNH ẢNH</h2>
                </div>
                
                <div class="preview-card-wrapper">
                    <!-- Target element that acts as the container query parent -->
                    <div class="certificate-preview-container" id="certificatePreview">
                        <img id="bgTemplateImg" alt="Phôi Giấy Khen PUBG Mobile" class="bg-template-img">
                        <!-- Dynamic name overlay placed absolutely above the line in the background -->
                        <div class="name-overlay calligraphy font-color-gold" id="nameOverlay">
                            Chiến Binh Chạy Bo
                        </div>
                    </div>
                </div>
                
                <div class="preview-caption">
                    <i class="fa-solid fa-expand-arrows-alt"></i> Bản xem trước tự động co giãn vừa màn hình
                </div>
            </section>
        </main>
        
    <!-- PUBG Style Reward Modal Dialog for Mobile Saving -->
    <div id="rewardModal" class="modal-overlay" style="display: none;">
        <div class="modal-card animate-zoom-in">
            <button class="modal-close-btn" id="btnMapClose">&times;</button>
            <div class="modal-header">
                <i class="fa-solid fa-trophy modal-trophy animate-bounce"></i>
                <h3>BATTLEGROUNDS REWARD</h3>
                <h2>GIẤY KHEN ĐÃ SẴN SÀNG!</h2>
            </div>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalExportedImg" src="" alt="Giấy Khen Của Bạn" class="modal-exported-img">
                </div>
                <div class="modal-instruction" id="modalInstruction">
                    <!-- Populated dynamically by JS -->
                </div>
            </div>
            <div class="modal-footer">
                <button id="btnModalDownload" class="btn btn-primary btn-lg glow-effect">
                    <span class="btn-content">
                        <i class="fa-solid fa-download"></i> TẢI XUỐNG LẠI
                    </span>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden High-Res Canvas for Drawing and Exporting -->
    <canvas id="exportCanvas" width="6250" height="4419" style="display: none;"></canvas>
    
    <script src="template_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
